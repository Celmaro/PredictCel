[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "predictcel"
version = "0.1.0"
description = "Paper-mode basket consensus and arbitrage sidecar scaffold"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Celmaro" }]
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
